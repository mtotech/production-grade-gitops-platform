replicaCount: 2

image:
  repository: chauhanneru877/gitops-platform
  tag: "v1.0.1"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: false
  className: alb

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi

app:
  name: gitops-platform
  version: "1.0.0"
